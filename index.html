<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header">
      <h1 class="header__title">商品一覧</h1>
    </header>

    <main class="main">
      <section class="search">
        <h2 class="section-title">検索</h2>
        <form class="search__form">
          <label for="keyword" class="search__label">キーワード</label>
          <input
            type="text"
            id="keyword"
            name="keyword"
            class="search__input"
            placeholder="商品名を入力"
          />
          <button type="submit" class="search__button">検索</button>
        </form>
      </section>

      <section class="add-product">
        <h2 class="section-title">商品追加</h2>
        <form class="add-form">
          <input
            type="text"
            class="add-input"
            placeholder="追加する商品名"
            required
          />
          <button type="button" class="add-button">追加</button>
        </form>
      </section>

      <section class="product">
        <h2 class="section-title">商品リスト</h2>
        <ul class="product__list" id="productList"></ul>
      </section>
    </main>

    <footer class="footer">
      <small>© 2026 Frontend Practice</small>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
